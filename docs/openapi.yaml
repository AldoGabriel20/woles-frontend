            application/json:
              schema:
                $ref: '#/components/schemas/ChatUsageResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /chat/intents:
    get:
      operationId: getChatIntents
      summary: Get top detected intents from recent messages
      tags: [Chat]
      responses:
        "200":
          description: Top intents
          content:
            application/json:
              schema:
                type: object
                properties:
                  intents:
                    type: array
                    items:
                      $ref: '#/components/schemas/DetectedIntent'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "500":
          $ref: '#/components/responses/InternalServerError'

  # ───────────────────────────────────────────────────────────
  # Account
  # ───────────────────────────────────────────────────────────
  /account/profile:
    get:
      operationId: getProfile
      summary: Get user profile
      tags: [Account]
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "500":
          $ref: '#/components/responses/InternalServerError'
    patch:
      operationId: updateProfile
      summary: Update user profile
      tags: [Account]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /account/avatar:
    post:
      operationId: uploadAvatar
      summary: Upload user avatar
      tags: [Account]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: JPEG or PNG, max 2 MB
      responses:
        "200":
          description: Avatar uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  avatar_url:
                    type: string
                    format: uri
        "400":
          description: Invalid file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /account/export:
    get:
      operationId: exportAccountData
      summary: Export all user data (GDPR)
      description: Generates a downloadable archive of all user data.
      tags: [Account]
      responses:
        "200":
          description: Data export file
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "401":
          $ref: '#/components/responses/Unauthorized'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /account:
    delete:
      operationId: deleteAccount
      summary: Delete account (hard delete after 30-day grace period)
      tags: [Account]
      responses:
        "200":
          description: Account deletion scheduled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Account scheduled for deletion in 30 days.
        "401":
          $ref: '#/components/responses/Unauthorized'
        "500":
          $ref: '#/components/responses/InternalServerError'

  # ───────────────────────────────────────────────────────────
  # Billing
  # ───────────────────────────────────────────────────────────
  /billing/plan:
    get:
      operationId: getBillingPlan
      summary: Get current plan details
      tags: [Billing]
      responses:
        "200":
          description: Current plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /billing/checkout:
    post:
      operationId: createCheckout
      summary: Create a payment checkout session
      tags: [Billing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        "200":
          description: Checkout URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /billing/webhook:
    post:
      operationId: billingWebhook
      summary: Payment provider webhook
      description: |
        Receives payment lifecycle events from the payment provider.
        The `X-Webhook-Signature` header must contain a valid HMAC-SHA256
        signature computed from the raw request body using the provider secret.
      tags: [Billing]
      security: []
      parameters:
        - name: X-Webhook-Signature
          in: header
          required: true
          schema:
            type: string
          description: HMAC-SHA256 signature of the raw request body
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Provider-specific event payload
              additionalProperties: true
      responses:
        "200":
          description: Webhook received
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: true
        "401":
          description: Invalid signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          $ref: '#/components/responses/InternalServerError'

# =============================================================
# Webhooks (external — not under /api/v1/ prefix)
# =============================================================
x-webhooks:
  whatsappWebhook:
    post:
      operationId: whatsappWebhook
      summary: Receive inbound WhatsApp message
      description: |
        Called by the WhatsApp cloud provider when a user sends a message.
        The provider signature in `X-Webhook-Signature` is verified before processing.
        The response is returned immediately (HTTP 200) and processing continues asynchronously.
        **Path:** `POST /webhooks/whatsapp/{provider}`
      tags: [Webhooks]
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            example: meta
          description: WhatsApp provider identifier (e.g. meta, twilio)
        - name: X-Webhook-Signature
          in: header
          required: true
          schema:
            type: string
          description: HMAC-SHA256 signature provided by the WhatsApp provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Provider-specific inbound message payload
              additionalProperties: true
      responses:
        "200":
          description: Webhook accepted for async processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: true
        "401":
          description: Invalid or missing signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          $ref: '#/components/responses/InternalServerError'
