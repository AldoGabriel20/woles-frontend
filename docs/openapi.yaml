openapi: 3.1.0
info:
  title: Woles API
  description: |
    Woles is a WhatsApp-first personal life administration assistant with a companion web dashboard.
    All authenticated endpoints require a valid RS256 JWT in the `Authorization: Bearer <token>` header.
    Access tokens expire in **15 minutes**. Use `POST /auth/refresh` to obtain a new pair.
  version: 1.0.0
  contact:
    name: Woles Team
    url: https://woles.id

servers:
  - url: https://api.woles.id/api/v1
    description: Production
  - url: http://localhost:8080/api/v1
    description: Local development

tags:
  - name: Auth
    description: Authentication — register, login, OTP, 2FA, sessions, token refresh
  - name: Reminders
    description: Personal and family reminders with recurrence
  - name: Documents
    description: Important document vault with expiry tracking
  - name: Subscriptions
    description: Subscription and recurring bill tracking
  - name: Goals
    description: Financial savings goals
  - name: Finances
    description: Financial overview, spending analysis, and bill forecasting
  - name: Timeline
    description: Unified life timeline aggregating all upcoming events
  - name: Notifications
    description: Notification history, stats, and exports
  - name: Family
    description: Family member management and shared reminders (Advanced plan)
  - name: Chat
    description: AI Chat Hub for natural language commands (AI plan)
  - name: Account
    description: User profile, avatar, data export, and account deletion
  - name: Billing
    description: Subscription plan management and checkout
  - name: Webhooks
    description: Inbound webhook endpoints for external providers

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ─────────────────────────────────────────────
    # Shared / utility schemas
    # ─────────────────────────────────────────────
    PaginationMeta:
      type: object
      required: [page, per_page, total, total_pages]
      properties:
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 20
        total:
          type: integer
          example: 87
        total_pages:
          type: integer
          example: 5

    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          example: validation_error
        message:
          type: string
          example: Request validation failed
        details:
          type: object
          additionalProperties:
            type: string

    RateLimitErrorResponse:
      type: object
      required: [error, message, retry_after]
      properties:
        error:
          type: string
          example: rate_limit_exceeded
        message:
          type: string
          example: Too many requests. Please try again later.
        retry_after:
          type: integer
          example: 60

    # ─────────────────────────────────────────────
    # User / Identity
    # ─────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        phone:
          type: string
          example: "+6281234567890"
        name:
          type: string
          example: Aldo Gabriel
        avatar_url:
          type: string
          format: uri
          nullable: true
        plan:
          type: string
          enum: [free, premium, advanced]
        timezone:
          type: string
          example: Asia/Jakarta
        totp_enabled:
          type: boolean
        account_status:
          type: string
          enum: [active, suspended, deleted]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TokenPair:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
          description: RS256 JWT, valid for 15 minutes
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: Seconds until access token expires
          example: 900

    UserSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ip_address:
          type: string
          example: 203.0.113.45
        user_agent:
          type: string
          example: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7)
        last_active_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    TOTPSetup:
      type: object
      required: [secret, qr_code_url]
      properties:
        secret:
          type: string
          description: Base32-encoded TOTP secret for manual entry
          example: JBSWY3DPEHPK3PXP
        qr_code_url:
          type: string
          format: uri
          description: otpauth:// URL for QR code display

    # ─────────────────────────────────────────────
    # Auth request bodies
    # ─────────────────────────────────────────────
    RegisterRequest:
      type: object
      required: [email, password, name, timezone]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
          maxLength: 200
        timezone:
          type: string
          example: Asia/Jakarta

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    OTPRequestBody:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
          example: "+6281234567890"

    OTPVerifyRequest:
      type: object
      required: [phone, otp]
      properties:
        phone:
          type: string
          example: "+6281234567890"
        otp:
          type: string
          example: "123456"

    ChangePasswordRequest:
      type: object
      required: [old_password, new_password]
      properties:
        old_password:
          type: string
        new_password:
          type: string
          minLength: 8

    PasswordResetRequestBody:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    PasswordResetConfirmRequest:
      type: object
      required: [token, new_password]
      properties:
        token:
          type: string
        new_password:
          type: string
          minLength: 8

    Verify2FARequest:
      type: object
      required: [totp_code]
      properties:
        totp_code:
          type: string
          example: "123456"

    Disable2FARequest:
      type: object
      required: [password]
      properties:
        password:
          type: string

    # ─────────────────────────────────────────────
    # Reminder
    # ─────────────────────────────────────────────
    Reminder:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        family_member_id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
          example: Bayar BPJS
        description:
          type: string
          nullable: true
        category:
          type: string
          example: health
        recurrence_type:
          type: string
          enum: [one_time, daily, weekly, monthly, yearly, custom_interval]
        recurrence_rule:
          type: object
          nullable: true
          description: JSONB rule (e.g. {"interval_days":14} for custom_interval)
          additionalProperties: true
        next_run_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, paused, archived]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateReminderRequest:
      type: object
      required: [title, recurrence_type, next_run_at]
      properties:
        title:
          type: string
          maxLength: 200
        description:
          type: string
          nullable: true
        category:
          type: string
          example: health
        recurrence_type:
          type: string
          enum: [one_time, daily, weekly, monthly, yearly, custom_interval]
        recurrence_rule:
          type: object
          nullable: true
          additionalProperties: true
        next_run_at:
          type: string
          format: date-time
        family_member_id:
          type: string
          format: uuid
          nullable: true

    UpdateReminderRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 200
        description:
          type: string
          nullable: true
        category:
          type: string
        recurrence_type:
          type: string
          enum: [one_time, daily, weekly, monthly, yearly, custom_interval]
        recurrence_rule:
          type: object
          nullable: true
          additionalProperties: true
        next_run_at:
          type: string
          format: date-time

    # ─────────────────────────────────────────────
    # Document
    # ─────────────────────────────────────────────
    Document:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        family_member_id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
          example: STNK Honda Civic 2023
        vault_category:
          type: string
          enum: [vehicles, identity, insurance, financials, other]
        storage_type:
          type: string
          enum: [physical, digital, scan_verified]
        expiry_date:
          type: string
          format: date
          nullable: true
        file_url:
          type: string
          format: uri
          nullable: true
        file_size_bytes:
          type: integer
          nullable: true
        file_mime_type:
          type: string
          nullable: true
        reminder_offsets:
          type: array
          items:
            type: integer
          description: Days before expiry to send reminders (e.g. [30,7,1])
          example: [30, 7, 1]
        notes:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, archived]
        days_until_expiry:
          type: integer
          nullable: true
        expiry_risk:
          type: string
          enum: [safe, upcoming, urgent, expired]
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateDocumentRequest:
      type: object
      required: [title, vault_category, storage_type]
      properties:
        title:
          type: string
          maxLength: 200
        vault_category:
          type: string
          enum: [vehicles, identity, insurance, financials, other]
        storage_type:
          type: string
          enum: [physical, digital, scan_verified]
        expiry_date:
          type: string
          format: date
          nullable: true
        reminder_offsets:
          type: array
          items:
            type: integer
          example: [30, 7, 1]
        notes:
          type: string
          nullable: true
        family_member_id:
          type: string
          format: uuid
          nullable: true

    UpdateDocumentRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 200
        vault_category:
          type: string
          enum: [vehicles, identity, insurance, financials, other]
        storage_type:
          type: string
          enum: [physical, digital, scan_verified]
        expiry_date:
          type: string
          format: date
          nullable: true
        reminder_offsets:
          type: array
          items:
            type: integer
        notes:
          type: string
          nullable: true

    StorageUsage:
      type: object
      properties:
        used_bytes:
          type: integer
          example: 5242880
        used_mb:
          type: number
          format: float
          example: 5.0
        used_gb:
          type: number
          format: float
          example: 0.005
        file_count:
          type: integer
          example: 3

    VaultHealth:
      type: object
      properties:
        completeness_pct:
          type: integer
          example: 67
        categories:
          type: object
          properties:
            vehicles:
              type: integer
            identity:
              type: integer
            insurance:
              type: integer
            financials:
              type: integer
            other:
              type: integer

    # ─────────────────────────────────────────────
    # Subscription
    # ─────────────────────────────────────────────
    Subscription:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
          example: Netflix
        amount:
          type: number
          format: float
          example: 54000
        currency:
          type: string
          example: IDR
        billing_cycle:
          type: string
          enum: [monthly, yearly, custom]
        next_billing_at:
          type: string
          format: date-time
        category:
          type: string
          example: entertainment
        status:
          type: string
          enum: [active, paused, archived]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateSubscriptionRequest:
      type: object
      required: [name, amount, currency, billing_cycle]
      properties:
        name:
          type: string
          maxLength: 200
        amount:
          type: number
          format: float
          minimum: 0
        currency:
          type: string
          example: IDR
        billing_cycle:
          type: string
          enum: [monthly, yearly, custom]
        next_billing_at:
          type: string
          format: date-time
          nullable: true
        category:
          type: string
          example: entertainment

    UpdateSubscriptionRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        amount:
          type: number
          format: float
          minimum: 0
        currency:
          type: string
        billing_cycle:
          type: string
          enum: [monthly, yearly, custom]
        next_billing_at:
          type: string
          format: date-time
          nullable: true
        category:
          type: string

    MonthlyCostSummary:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              currency:
                type: string
                example: IDR
              total_amount:
                type: number
                format: float
                example: 392000
              subscription_count:
                type: integer
                example: 7

    # ─────────────────────────────────────────────
    # Goal
    # ─────────────────────────────────────────────
    Goal:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        title:
          type: string
          example: Emergency Fund
        icon:
          type: string
          enum: [love, emergency, vehicle, home, travel, other]
        target_amount:
          type: number
          format: float
          example: 50000000
        current_amount:
          type: number
          format: float
          example: 12000000
        currency:
          type: string
          example: IDR
        monthly_target:
          type: number
          format: float
          nullable: true
        target_date:
          type: string
          format: date
          nullable: true
        status:
          type: string
          enum: [active, completed, archived]
        progress_pct:
          type: number
          format: float
          example: 24.0
        remaining:
          type: number
          format: float
          example: 38000000
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateGoalRequest:
      type: object
      required: [title, target_amount, currency]
      properties:
        title:
          type: string
          maxLength: 200
        icon:
          type: string
          enum: [love, emergency, vehicle, home, travel, other]
          default: other
        target_amount:
          type: number
          format: float
          minimum: 0.01
        currency:
          type: string
          example: IDR
        monthly_target:
          type: number
          format: float
          nullable: true
        target_date:
          type: string
          format: date
          nullable: true

    UpdateGoalRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 200
        icon:
          type: string
          enum: [love, emergency, vehicle, home, travel, other]
        target_amount:
          type: number
          format: float
          minimum: 0.01
        monthly_target:
          type: number
          format: float
          nullable: true
        target_date:
          type: string
          format: date
          nullable: true

    UpdateProgressRequest:
      type: object
      required: [current_amount]
      properties:
        current_amount:
          type: number
          format: float
          minimum: 0

    GoalWithTip:
      allOf:
        - $ref: '#/components/schemas/Goal'
        - type: object
          properties:
            tip:
              type: string
              example: "You're 3 months ahead of schedule. Keep it up!"

    # ─────────────────────────────────────────────
    # Notification
    # ─────────────────────────────────────────────
    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        entity_type:
          type: string
          example: reminder
        entity_id:
          type: string
          format: uuid
        channel:
          type: string
          enum: [whatsapp, email]
        message:
          type: string
        scheduled_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [scheduled, sending, sent, failed, canceled]
        sent_at:
          type: string
          format: date-time
          nullable: true
        retry_count:
          type: integer
          example: 0
        idempotency_key:
          type: string
        created_at:
          type: string
          format: date-time

    NotificationStats:
      type: object
      properties:
        total_sent:
          type: integer
          example: 84
        total_failed:
          type: integer
          example: 2
        delivery_rate_pct:
          type: number
          format: float
          example: 97.7
        top_category:
          type: string
          example: vehicle

    # ─────────────────────────────────────────────
    # Timeline
    # ─────────────────────────────────────────────
    TimelineItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [reminder, document, subscription, goal]
        title:
          type: string
          example: Netflix
        due_at:
          type: string
          format: date-time
        status:
          type: string
          example: upcoming
        entity_id:
          type: string
          format: uuid

    # ─────────────────────────────────────────────
    # Family
    # ─────────────────────────────────────────────
    FamilyMember:
      type: object
      properties:
        id:
          type: string
          format: uuid
        owner_user_id:
          type: string
          format: uuid
        name:
          type: string
          example: Budi Santoso
        role:
          type: string
          enum: [primary, spouse, parent, child, other]
        relation_label:
          type: string
          example: Suami
          nullable: true
        date_of_birth:
          type: string
          format: date
          nullable: true
        avatar_url:
          type: string
          format: uri
          nullable: true
        active_reminder_count:
          type: integer
          example: 3
        created_at:
          type: string
          format: date-time

    CreateFamilyMemberRequest:
      type: object
      required: [name, role]
      properties:
        name:
          type: string
          maxLength: 200
        role:
          type: string
          enum: [primary, spouse, parent, child, other]
        relation_label:
          type: string
          nullable: true
        date_of_birth:
          type: string
          format: date
          nullable: true

    UpdateFamilyMemberRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        role:
          type: string
          enum: [primary, spouse, parent, child, other]
        relation_label:
          type: string
          nullable: true
        date_of_birth:
          type: string
          format: date
          nullable: true

    # ─────────────────────────────────────────────
    # Chat
    # ─────────────────────────────────────────────
    ChatMessage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
          example: "Ingatkan saya bayar listrik setiap tanggal 20"
        detected_intent:
          type: object
          nullable: true
          additionalProperties: true
        created_at:
          type: string
          format: date-time

    SendMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          maxLength: 4000

    ChatUsageResponse:
      type: object
      properties:
        messages_used:
          type: integer
          example: 7
        quota:
          type: integer
          example: 10
        remaining:
          type: integer
          example: 3
        plan_name:
          type: string
          example: free

    DetectedIntent:
      type: object
      properties:
        intent:
          type: string
          example: create_reminder
        count:
          type: integer
          example: 4

    # ─────────────────────────────────────────────
    # Finances
    # ─────────────────────────────────────────────
    FinancialSummary:
      type: object
      properties:
        period:
          type: string
          example: "2026-06"
        total_expenses:
          type: number
          format: float
          example: 12450000
        income:
          type: number
          format: float
          example: 25000000
        savings:
          type: number
          format: float
          example: 4500000
        currency:
          type: string
          example: IDR
        change_vs_last_period_pct:
          type: number
          format: float
          example: -8.4

    SpendingBreakdown:
      type: object
      properties:
        categories:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                example: Household
              amount:
                type: number
                format: float
                example: 5600000
              pct:
                type: number
                format: float
                example: 45

    SpendingTrend:
      type: object
      properties:
        period:
          type: string
          example: "2026-06"
        weeks:
          type: array
          items:
            type: object
            properties:
              week:
                type: integer
                example: 1
              total:
                type: number
                format: float
                example: 3200000

    UpcomingBill:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Netflix
        amount:
          type: number
          format: float
          example: 54000
        currency:
          type: string
          example: IDR
        next_billing_at:
          type: string
          format: date-time
        bill_status:
          type: string
          enum: [URGENT, PENDING, SCHEDULED]

    # ─────────────────────────────────────────────
    # Account
    # ─────────────────────────────────────────────
    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        timezone:
          type: string
          example: Asia/Jakarta

    # ─────────────────────────────────────────────
    # Billing
    # ─────────────────────────────────────────────
    Plan:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          enum: [free, premium, advanced]
        price_idr:
          type: number
          format: float
          example: 39000
        reminder_limit:
          type: integer
          nullable: true
          description: null means unlimited
        document_limit:
          type: integer
          nullable: true
        subscription_limit:
          type: integer
          nullable: true
        goal_tracker:
          type: boolean
        family_account:
          type: boolean
        ai_chat:
          type: boolean
        ai_chat_quota:
          type: integer
          nullable: true

    CheckoutRequest:
      type: object
      required: [plan]
      properties:
        plan:
          type: string
          enum: [premium, advanced]

    CheckoutResponse:
      type: object
      properties:
        checkout_url:
          type: string
          format: uri
          example: https://payment.provider.id/checkout/abc123

  responses:
    Unauthorized:
      description: Access token is missing, expired, or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: unauthorized
            message: Token is expired or invalid

    Forbidden:
      description: Insufficient permissions or plan
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found or not owned by the caller
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: not_found
            message: Resource not found

    UnprocessableEntity:
      description: Request body failed validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    TooManyRequests:
      description: Rate limit exceeded
      headers:
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        Retry-After:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RateLimitErrorResponse'

    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  parameters:
    pageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    perPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    sortParam:
      name: sort
      in: query
      schema:
        type: string
    orderParam:
      name: order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc

# =============================================================
# Paths
# =============================================================
paths:

  # ───────────────────────────────────────────────────────────
  # Auth
  # ───────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: authRegister
      summary: Register with email and password
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  tokens:
                    $ref: '#/components/schemas/TokenPair'
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
        "429":
          $ref: '#/components/responses/TooManyRequests'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /auth/login:
    post:
      operationId: authLogin
      summary: Login with email and password
      description: |
        Returns an access token and sets an HttpOnly `refresh_token` cookie.
        After 5 consecutive failed attempts the account is locked for 15 minutes.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  tokens:
                    $ref: '#/components/schemas/TokenPair'
        "400":
          description: Invalid credentials or locked account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
        "429":
          $ref: '#/components/responses/TooManyRequests'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /auth/logout:
    post:
      operationId: authLogout
      summary: Logout current session
      description: Revokes the current refresh token. The HttpOnly cookie is cleared.
      tags: [Auth]
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out successfully
        "401":
          $ref: '#/components/responses/Unauthorized'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /auth/refresh:
    post:
      operationId: authRefresh
      summary: Refresh access token
      description: |
        Issues a new token pair using the HttpOnly `refresh_token` cookie.
        The old refresh token is revoked immediately (rotation). Token reuse
        triggers revocation of the entire token family.
      tags: [Auth]
      security: []
      responses:
        "200":
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /auth/otp/request:
    post:
      operationId: authOTPRequest
      summary: Request WhatsApp OTP
      description: Sends a 6-digit OTP to the provided phone number via WhatsApp. Valid for 5 minutes.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OTPRequestBody'
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: OTP sent to WhatsApp
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
        "429":
          $ref: '#/components/responses/TooManyRequests'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /auth/otp/verify:
    post:
      operationId: authOTPVerify
      summary: Verify WhatsApp OTP
      description: Validates the OTP and issues a token pair. Creates the user if first-time login.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OTPVerifyRequest'
      responses:
        "200":
          description: OTP verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  tokens:
                    $ref: '#/components/schemas/TokenPair'
        "400":
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
        "429":
          $ref: '#/components/responses/TooManyRequests'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /auth/password/change:
    post:
      operationId: authPasswordChange
      summary: Change password
      description: Verifies current password then sets new password. Revokes all existing refresh tokens.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Password changed successfully
        "400":
          description: Old password incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /auth/password/reset/request:
    post:
      operationId: authPasswordResetRequest
      summary: Request password reset email
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestBody'
      responses:
        "200":
          description: If the email exists, a reset link was sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Reset link sent if account exists
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
        "429":
          $ref: '#/components/responses/TooManyRequests'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /auth/password/reset/confirm:
    post:
      operationId: authPasswordResetConfirm
      summary: Confirm password reset with token
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
      responses:
        "200":
          description: Password reset successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Password reset successfully
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /auth/me:
    get:
      operationId: authGetMe
      summary: Get current authenticated user
      tags: [Auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /auth/2fa/enable:
    post:
      operationId: auth2FAEnable
      summary: Enable two-factor authentication
      description: Generates a TOTP secret. Returns the secret and QR code URL for app scanning.
      tags: [Auth]
      responses:
        "200":
          description: TOTP setup details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TOTPSetup'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /auth/2fa/verify:
    post:
      operationId: auth2FAVerify
      summary: Verify and activate two-factor authentication
      description: Validates the TOTP code and activates 2FA on the account.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Verify2FARequest'
      responses:
        "200":
          description: 2FA activated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Two-factor authentication enabled
        "400":
          description: Invalid TOTP code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /auth/2fa/disable:
    post:
      operationId: auth2FADisable
      summary: Disable two-factor authentication
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Disable2FARequest'
      responses:
        "200":
          description: 2FA disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Two-factor authentication disabled
        "400":
          description: Password incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /auth/sessions:
    get:
      operationId: authGetSessions
      summary: List active sessions
      tags: [Auth]
      responses:
        "200":
          description: Active sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserSession'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "500":
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: authRevokeAllSessions
      summary: Revoke all sessions
      description: Logs out from all devices.
      tags: [Auth]
      responses:
        "200":
          description: All sessions revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: All sessions revoked
        "401":
          $ref: '#/components/responses/Unauthorized'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /auth/sessions/{id}:
    delete:
      operationId: authRevokeSession
      summary: Revoke a specific session
      tags: [Auth]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Session revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Session revoked
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalServerError'

  # ───────────────────────────────────────────────────────────
  # Reminders
  # ───────────────────────────────────────────────────────────
  /reminders:
    post:
      operationId: createReminder
      summary: Create a reminder
      tags: [Reminders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReminderRequest'
      responses:
        "201":
          description: Reminder created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reminder'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          description: Plan limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
        "429":
          $ref: '#/components/responses/TooManyRequests'
        "500":
          $ref: '#/components/responses/InternalServerError'
    get:
      operationId: listReminders
      summary: List reminders
      tags: [Reminders]
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/perPageParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [active, paused, archived]
        - name: category
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/sortParam'
        - $ref: '#/components/parameters/orderParam'
      responses:
        "200":
          description: Paginated reminder list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Reminder'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /reminders/{id}:
    get:
      operationId: getReminderByID
      summary: Get a reminder by ID
      tags: [Reminders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Reminder found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reminder'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalServerError'
    patch:
      operationId: updateReminder
      summary: Update a reminder
      tags: [Reminders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReminderRequest'
      responses:
        "200":
          description: Reminder updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reminder'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
        "500":
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: deleteReminder
      summary: Delete a reminder (soft delete)
      tags: [Reminders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Reminder deleted
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /reminders/{id}/pause:
    post:
      operationId: pauseReminder
      summary: Pause a reminder
      tags: [Reminders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Reminder paused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reminder'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /reminders/{id}/resume:
    post:
      operationId: resumeReminder
      summary: Resume a paused reminder
      tags: [Reminders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Reminder resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reminder'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /reminders/{id}/complete:
    post:
      operationId: completeReminderOccurrence
      summary: Mark current occurrence as done and advance to next
      tags: [Reminders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Occurrence completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reminder'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalServerError'

  # ───────────────────────────────────────────────────────────
  # Documents
  # ───────────────────────────────────────────────────────────
  /documents:
    post:
      operationId: createDocument
      summary: Create a document record
      tags: [Documents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentRequest'
      responses:
        "201":
          description: Document created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          description: Plan limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
        "429":
          $ref: '#/components/responses/TooManyRequests'
        "500":
          $ref: '#/components/responses/InternalServerError'
    get:
      operationId: listDocuments
      summary: List documents
      tags: [Documents]
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/perPageParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived]
        - name: vault_category
          in: query
          schema:
            type: string
            enum: [vehicles, identity, insurance, financials, other]
        - $ref: '#/components/parameters/sortParam'
        - $ref: '#/components/parameters/orderParam'
      responses:
        "200":
          description: Paginated document list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Document'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /documents/{id}:
    get:
      operationId: getDocumentByID
      summary: Get a document by ID
      tags: [Documents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Document found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalServerError'
    patch:
      operationId: updateDocument
      summary: Update a document
      tags: [Documents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDocumentRequest'
      responses:
        "200":
          description: Document updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
        "500":
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: deleteDocument
      summary: Delete a document (soft delete)
      tags: [Documents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Document deleted
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /documents/{id}/file:
    post:
      operationId: uploadDocumentFile
      summary: Upload a file for a document
      description: |
        Accepts `multipart/form-data`. Allowed MIME types: `application/pdf`, `image/jpeg`, `image/png`.
        Maximum file size: **10 MB**. The file is stored in private object storage and served via signed URL.
      tags: [Documents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF, JPEG, or PNG file, max 10 MB
      responses:
        "200":
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        "400":
          description: Invalid file type or size exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "429":
          $ref: '#/components/responses/TooManyRequests'
        "500":
          $ref: '#/components/responses/InternalServerError'
    delete:
      operationId: deleteDocumentFile
      summary: Delete the uploaded file from a document
      tags: [Documents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: File deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /documents/storage/usage:
    get:
      operationId: getDocumentStorageUsage
      summary: Get total storage usage for the user
      tags: [Documents]
      responses:
        "200":
          description: Storage usage summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorageUsage'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /documents/vault/health:
    get:
      operationId: getVaultHealth
      summary: Get document vault completeness score
      description: Returns document count per category and an overall completeness percentage.
      tags: [Documents]
      responses:
