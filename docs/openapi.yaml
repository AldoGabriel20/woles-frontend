      tags: [Timeline]
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
            example: "2026-09-01"
        - name: to
          in: query
          schema:
            type: string
            format: date
            example: "2026-09-30"
        - name: range
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d, this_month, next_month]
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/perPageParam'
      responses:
        "200":
          description: Timeline items
          content:
